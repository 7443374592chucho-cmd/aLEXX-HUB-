<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KrynexLua</title>

<style>
body{
background:#0B1020;
color:white;
font-family:Arial,sans-serif;
text-align:center;
margin:0;
}

header{
padding:30px;
font-size:35px;
font-weight:bold;
color:#8B5CF6;
}

.hero{
padding:60px 20px;
}

input{
width:80%;
max-width:500px;
padding:15px;
border:none;
border-radius:12px;
}

button{
padding:15px 25px;
margin:10px;
border:none;
border-radius:12px;
background:#8B5CF6;
color:white;
cursor:pointer;
}

.card{
background:#131C31;
padding:20px;
margin:20px;
border-radius:15px;
}
</style>
</head>

<body>

<header>⚡ KRYNEXLUA</header>

<div class="hero">
<h1>Comparte y descubre scripts Lua</h1>

<input placeholder="Buscar scripts...">

<br>

<button>Explorar</button>
<button>Subir Script</button>
</div>

<div class="card">
<h2>Scripts recientes</h2>
<p>Aquí aparecerán los scripts.</p>
</div>

</body>
</html>
